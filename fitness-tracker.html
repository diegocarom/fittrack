// ── SCREEN: PROGRESO ──────────────────────────────────────────────────────────
const ProgressScreen = () => {
  const [workouts] = useState(initWorkouts);
  const [nutrition] = useState(initNutrition);
  const [bodyMetrics] = useState(initBodyMetrics);
  const [exerciseUnits] = useState(initExerciseUnits);
  const [tab, setTab] = useState('workout');
  const [selExercise, setSelExercise] = useState('');

  // Extract all exercise names from workouts
  const allExercises = useMemo(() => {
    const set = new Set();
    Object.values(workouts).forEach(w => { if (w.sets) Object.keys(w.sets).forEach(ex => set.add(ex)); });
    return [...set];
  }, [workouts]);

  // Exercise progress data — only tracked sets
  const exProgressData = useMemo(() => {
    if (!selExercise) return [];
    return Object.entries(workouts)
      .filter(([, w]) => w.sets?.[selExercise])
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([date, w]) => {
        const sets = w.sets[selExercise].filter(s => s.trackInGraph !== false);
        if (!sets.length) return null;
        const maxWeight = Math.max(...sets.map(s => parseFloat(s.weight)||0));
        return { label: date.slice(5), value: maxWeight };
      })
      .filter(Boolean);
  }, [selExercise, workouts]);

  // Volume data per workout — only tracked sets
  const volumeData = useMemo(() => Object.entries(workouts).sort((a,b)=>a[0].localeCompare(b[0])).slice(-15).map(([date, w]) => {
    let vol = 0;
    if (w.sets) Object.values(w.sets).forEach(sets => sets.forEach(s => {
      if (s.trackInGraph === false) return;
      vol += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
    }));
    return { label: date.slice(5), value: Math.round(vol) };
  }), [workouts]);

  // Nutrition data
  const calData = useMemo(() => Object.entries(nutrition).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14).map(([date, d]) => {
    const items = [...(d.desayuno||[]), ...(d.almuerzo||[]), ...(d.cena||[]), ...(d.snacks||[])];
    const cal = items.reduce((a, i) => a + (i.calories||0), 0);
    return { label: date.slice(5), value: Math.round(cal) };
  }), [nutrition]);

  const protData = useMemo(() => Object.entries(nutrition).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14).map(([date, d]) => {
    const items = [...(d.desayuno||[]), ...(d.almuerzo||[]), ...(d.cena||[]), ...(d.snacks||[])];
    const prot = items.reduce((a, i) => a + (i.protein||0), 0);
    return { label: date.slice(5), value: +prot.toFixed(1) };
  }), [nutrition]);

  const weightData = bodyMetrics.filter(m=>m.weight>0).map(m => ({ label: m.date.slice(5), value: m.weight }));

  return (
    <div className="screen fade-in">
      <div className="topbar">
        <div className="topbar-title"><h2>Progreso</h2></div>
      </div>
      <div className="content">
        <div className="tabs">
          {[['workout','💪 Gym'],['nutrition','🥗 Nutrición'],['body','⚖️ Cuerpo']].map(([k, label]) => (
            <div key={k} className={`tab ${tab===k?'active':''}`} onClick={() => setTab(k)}>{label}</div>
          ))}
        </div>

        {tab === 'workout' && (
          <div className="col fade-in">
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>📊 Volumen total por sesión</h3>
              <LineChartComp data={volumeData} label="Volumen" color="#a78bfa" yLabel="kg·rep" />
            </div>
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>🏋️ Progreso por ejercicio</h3>
              {allExercises.length === 0 ? (
                <div className="empty-state"><div className="empty-text">Sin datos de entrenamiento aún</div></div>
              ) : (
                <>
                  <select className="input" style={{ marginBottom: 12 }} value={selExercise} onChange={e => setSelExercise(e.target.value)}>
                    <option value="">Selecciona ejercicio…</option>
                    {allExercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}
                  </select>
                  {selExercise && (
                    <>
                      <div className="text-xs text-muted2" style={{ marginBottom: 8 }}>
                        Solo se grafican series marcadas con ✓. Series excluidas (poleas no comparables, etc.) no afectan el progreso.
                      </div>
                      <LineChartComp data={exProgressData} label="Peso máx." color="#6ee7f7" yLabel={exerciseUnits[selExercise] || 'kg'} />
                    </>
                  )}
                </>
              )}
            </div>
          </div>
        )}

        {tab === 'nutrition' && (
          <div className="col fade-in">
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>🔥 Calorías diarias</h3>
              <LineChartComp data={calData} label="Calorías" color="#f472b6" yLabel="kcal" />
            </div>
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>🥩 Proteína diaria</h3>
              <LineChartComp data={protData} label="Proteína" color="#a78bfa" yLabel="g" />
            </div>
          </div>
        )}

        {tab === 'body' && (
          <div className="col fade-in">
            <div className="card">
              <h3 style={{ marginBottom: 12 }}>⚖️ Evolución del peso</h3>
              <LineChartComp data={weightData} label="Peso" color="#6ee7f7" yLabel="kg" />
            </div>
            {weightData.length >= 2 && (
              <div className="stat-grid">
                <div className="stat-box">
                  <div className="stat-value text-accent">{weightData[0].value}</div>
                  <div className="stat-label">Peso inicial (kg)</div>
                </div>
                <div className="stat-box">
                  <div className="stat-value" style={{ color: weightData[weightData.length-1].value < weightData[0].value ? 'var(--accent4)' : 'var(--danger)' }}>
                    {(weightData[weightData.length-1].value - weightData[0].value).toFixed(1)}
                  </div>
                  <div className="stat-label">Cambio total (kg)</div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
const LoginScreen = ({ onLogin }) => {
  const [mode, setMode]       = useState('login'); // 'login' | 'register'
  const [email, setEmail]     = useState('');
  const [pass, setPass]       = useState('');
  const [error, setError]     = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!email.trim() || !pass.trim()) { setError('Completa todos los campos'); return; }
    setLoading(true); setError('');
    try {
      if (mode === 'register') {
        const { data, error: e } = await supa.auth.signUp({ email: email.trim(), password: pass });
        if (e) throw e;
        if (data.user && !data.session) {
          setError('Revisa tu email para confirmar la cuenta, luego inicia sesión.');
          setMode('login'); setLoading(false); return;
        }
        onLogin(data.user);
      } else {
        const { data, error: e } = await supa.auth.signInWithPassword({ email: email.trim(), password: pass });
        if (e) throw e;
        onLogin(data.user);
      }
    } catch (e) {
      setError(e.message || 'Error al conectar');
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '32px 24px', background: 'var(--bg)' }}>
      <div style={{ marginBottom: 40 }}>
        <div className="mono" style={{ fontSize: '2rem', fontWeight: 700, color: 'var(--accent)', letterSpacing: '-0.04em' }}>FitTrack</div>
        <div className="text-muted2" style={{ marginTop: 6, fontSize: '0.9rem' }}>Tu entrenamiento, sincronizado.</div>
      </div>

      <div className="tabs" style={{ marginBottom: 24 }}>
        <div className={`tab ${mode === 'login' ? 'active' : ''}`} onClick={() => { setMode('login'); setError(''); }}>Iniciar sesión</div>
        <div className={`tab ${mode === 'register' ? 'active' : ''}`} onClick={() => { setMode('register'); setError(''); }}>Crear cuenta</div>
      </div>

      <div className="col" style={{ gap: 14 }}>
        <div>
          <div className="label">Email</div>
          <input className="input" type="email" inputMode="email" autoComplete="email" placeholder="tu@email.com" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        <div>
          <div className="label">Contraseña</div>
          <input className="input" type="password" autoComplete={mode === 'register' ? 'new-password' : 'current-password'} placeholder="••••••••" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        {error && <div style={{ fontSize: '0.8rem', color: 'var(--danger)', background: 'rgba(248,113,113,0.08)', border: '1px solid rgba(248,113,113,0.2)', borderRadius: 8, padding: '10px 12px' }}>{error}</div>}
        <button className="btn btn-primary btn-full" style={{ marginTop: 4, padding: '14px' }} onClick={submit} disabled={loading}>
          {loading ? 'Conectando…' : mode === 'register' ? 'Crear cuenta' : 'Entrar'}
        </button>
      </div>

      <div style={{ marginTop: 32, fontSize: '0.75rem', color: 'var(--text3)', textAlign: 'center', lineHeight: 1.6 }}>
        Tus datos se sincronizan entre todos tus dispositivos.<br/>Protegidos con Supabase.
      </div>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
const App = () => {
  const [user, setUser]       = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [synced, setSynced]   = useState(false);
  const [tab, setTab]         = useState('workout');

  // On mount: check if already logged in
  useEffect(() => {
    supa.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) handleLogin(session.user, false);
    });
    // Listen for auth changes (e.g. email confirmation)
    const { data: { subscription } } = supa.auth.onAuthStateChange((_event, session) => {
      if (session?.user && !user) handleLogin(session.user, false);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogin = async (u, isNew = false) => {
    setUser(u);
    setUserId(u.id);
    setSyncing(true);
    try {
      await DB.syncDown();       // pull data from Supabase → localStorage cache
      if (isNew) await DB.syncUp(); // first login: push any existing localStorage data
    } catch(e) {}
    setSyncing(false);
    setSynced(true);
  };

  const handleLogout = async () => {
    await supa.auth.signOut();
    setUser(null);
    setUserId(null);
    setSynced(false);
  };

  if (!user) return <LoginScreen onLogin={(u) => handleLogin(u, true)} />;

  if (syncing) return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, color: 'var(--text2)' }}>
      <div className="mono" style={{ fontSize: '1.4rem', color: 'var(--accent)' }}>FitTrack</div>
      <div style={{ fontSize: '0.85rem' }}>Sincronizando datos…</div>
      <div style={{ width: 40, height: 40, border: '3px solid var(--border)', borderTop: '3px solid var(--accent)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
    </div>
  );

  const SCREENS = {
    workout:   <WorkoutScreen />,
    nutrition: <NutritionScreen />,
    metrics:   <MetricsScreen />,
    progress:  <ProgressScreen />,
    account:   <AccountScreen user={user} onLogout={handleLogout} />,
  };
  const NAV = [
    { key: 'workout',   icon: '🏋️', label: 'Gym'      },
    { key: 'nutrition', icon: '🥗',  label: 'Nutrición'},
    { key: 'metrics',   icon: '⚖️',  label: 'Métricas' },
    { key: 'progress',  icon: '📈',  label: 'Progreso' },
    { key: 'account',   icon: '👤',  label: 'Cuenta'   },
  ];
  return (
    <>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      {SCREENS[tab]}
      <nav className="bottom-nav">
        {NAV.map(({ key, icon, label }) => (
          <div key={key} className={`nav-item ${tab === key ? 'active' : ''}`} onClick={() => setTab(key)}>
            <span className="nav-icon">{icon}</span>
            <span className="nav-label">{label}</span>
          </div>
        ))}
      </nav>
    </>
  );
};

// ── ACCOUNT SCREEN ────────────────────────────────────────────────────────────
const AccountScreen = ({ user, onLogout }) => {
  const [syncing, setSyncing] = useState(false);
  const [msg, setMsg]         = useState('');

  const forceSync = async () => {
    setSyncing(true); setMsg('');
    try {
      await DB.syncDown();
      setMsg('✓ Datos sincronizados correctamente');
    } catch(e) { setMsg('Error al sincronizar'); }
    setSyncing(false);
  };

  return (
    <div className="screen fade-in">
      <div className="topbar">
        <div className="topbar-title"><h2>Mi Cuenta</h2></div>
      </div>
      <div className="content">
        <div className="card">
          <div className="text-xs text-muted2" style={{ marginBottom: 4 }}>Conectado como</div>
          <div className="fw-700">{user.email}</div>
          <div className="text-xs text-muted2" style={{ marginTop: 4 }}>ID: {user.id.slice(0,8)}…</div>
        </div>

        <div className="card">
          <div className="fw-700" style={{ marginBottom: 6 }}>☁️ Sincronización</div>
          <div className="text-xs text-muted2" style={{ marginBottom: 12 }}>Tus datos se sincronizan automáticamente. Si notas discrepancias entre dispositivos, fuerza la sincronización.</div>
          <button className="btn btn-ghost btn-full" onClick={forceSync} disabled={syncing}>
            {syncing ? 'Sincronizando…' : '🔄 Forzar sincronización'}
          </button>
          {msg && <div style={{ marginTop: 10, fontSize: '0.8rem', color: msg.startsWith('✓') ? 'var(--accent4)' : 'var(--danger)' }}>{msg}</div>}
        </div>

        <div className="card">
          <div className="fw-700" style={{ marginBottom: 6 }}>📱 Cómo usar en iPhone</div>
          <div className="text-xs text-muted2" style={{ lineHeight: 1.7 }}>
            1. Abre esta URL en Safari<br/>
            2. Toca el botón compartir (□↑)<br/>
            3. Selecciona "Añadir a pantalla de inicio"<br/>
            4. Inicia sesión con tu cuenta<br/>
            ✓ Los datos se sincronizan con el PC automáticamente
          </div>
        </div>

        <button className="btn btn-danger btn-full" onClick={onLogout}>Cerrar sesión</button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
